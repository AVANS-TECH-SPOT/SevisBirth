kind = "web"
previewPath = "/"
title = "SevisBirth"
version = "1.0.0"
id = "artifacts/sevisbirth"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19799

[services.development]
run = "pnpm --filter @workspace/sevisbirth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sevisbirth", "run", "build" ]
serve = "static"
publicDir = "artifacts/sevisbirth/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19799"
BASE_PATH = "/"
